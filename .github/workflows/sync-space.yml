name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.HUGGINGFACEHUB_API_TOKEN || secrets.HF_API_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO || 'Nexus-Walker/Reson-model' }}
        run: |
          set -e
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Missing Hugging Face token secret. Set HF_TOKEN (or HUGGINGFACEHUB_API_TOKEN / HF_API_TOKEN)."
            exit 1
          fi
          echo "Sync target Space: $HF_SPACE_REPO"
          git remote add hfspace "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"
          git push hfspace HEAD:main --force
