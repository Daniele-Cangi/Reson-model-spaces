name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing secret HF_TOKEN"
            exit 1
          fi
          if [ -z "$HF_SPACE_REPO" ]; then
            echo "Missing repo variable HF_SPACE_REPO (e.g. Nexus-Walker/reson-chat)"
            exit 1
          fi
          git remote add hfspace "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"
          git push hfspace HEAD:main --force
